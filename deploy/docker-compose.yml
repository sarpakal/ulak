# Standalone dev compose — runs Messenger.Api against a local postgres.
# Production deployment uses ~/apps/docker-compose.yml on the VPS.
services:
  ulak-messenger:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: ulak-service
    ports:
      - "5002:8080"
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
