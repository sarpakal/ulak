upstream messenger_api {
    server 127.0.0.1:5002;
}

# ulak.akgyh.com → Messenger.Api container (port 5002)
server {
    server_name ulak.akgyh.com;

    # Message-send endpoints: restrict to VPS-internal callers + known dev machines.
    # ULAK is otherwise a public "free SMS cannon" (no app-level auth yet — see SECURITY.md).
    # Allow set is log-derived (2 weeks of nginx access logs), not guessed:
    #   172.19.0.0/16  apps_appnet   — all platform containers (the workhorse caller)
    #   172.18.0.0/16  n8n_default   — n8n workflows (documented; keep as insurance)
    #   104.186.149.41 / 95.70.138.114 — dev machines (dynamic IPs; update if they change)
    # /health stays open (falls through to `location /`) for uptime monitoring.
    location /api/messages/ {
        allow 127.0.0.1;
        allow 172.19.0.0/16;
        allow 172.18.0.0/16;
        allow 104.186.149.41;
        allow 95.70.138.114;
        deny  all;

        proxy_pass http://messenger_api;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
    }

    location / {
        proxy_pass http://messenger_api;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate     /etc/letsencrypt/live/ulak.akgyh.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ulak.akgyh.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = ulak.akgyh.com) { return 301 https://$host$request_uri; }
    listen 80;
    server_name ulak.akgyh.com;
    return 404;
}

# VPS-internal prefix routing: http://<vps-ip>/messenger/* → Messenger.Api
location /messenger/ {
    proxy_pass http://messenger_api;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300;
}
